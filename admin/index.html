<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }

    /* 侧边栏 */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
      background: #1e1e2e; color: #cdd6f4; display: flex; flex-direction: column;
    }
    .sidebar .logo { padding: 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar .logo span { color: #89b4fa; }
    .sidebar nav { flex: 1; padding: 12px 0; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 10px; padding: 12px 20px;
      color: #a6adc8; text-decoration: none; font-size: 14px; transition: all .2s; cursor: pointer;
    }
    .sidebar nav a:hover { background: rgba(255,255,255,0.05); color: #cdd6f4; }
    .sidebar nav a.active { background: rgba(137,180,250,0.12); color: #89b4fa; border-right: 3px solid #89b4fa; }
    .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }

    /* 主内容 */
    .main { margin-left: 220px; padding: 24px; min-height: 100vh; }
    .page-title { font-size: 22px; font-weight: 600; margin-bottom: 20px; color: #1e1e2e; }

    /* 统计卡片 */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card .stat-label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 700; color: #1e1e2e; }
    .stat-card .stat-sub { font-size: 12px; color: #89b4fa; margin-top: 4px; }

    /* 表格 */
    .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 24px; overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; font-size: 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #fafafa; text-align: left; padding: 10px 16px; color: #666; font-weight: 500; border-bottom: 1px solid #eee; }
    td { padding: 10px 16px; border-bottom: 1px solid #f5f5f5; }
    tr:hover td { background: #fafbff; }

    /* 聊天记录面板 */
    .chat-panel { max-height: 500px; overflow-y: auto; padding: 16px; }
    .chat-record { display: flex; gap: 10px; margin-bottom: 12px; }
    .chat-record.user { flex-direction: row-reverse; }
    .chat-record .role-tag {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .chat-record.bot .role-tag { background: #e8f0fe; color: #4285f4; }
    .chat-record.user .role-tag { background: #fce8e6; color: #ea4335; }
    .chat-record .record-bubble {
      max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6;
    }
    .chat-record.bot .record-bubble { background: #f0f2f5; }
    .chat-record.user .record-bubble { background: #e8f0fe; }
    .chat-record .record-time { font-size: 11px; color: #999; margin-top: 4px; }

    /* 分页 */
    .pagination { display: flex; justify-content: center; gap: 8px; padding: 16px; }
    .pagination button {
      padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: white;
      cursor: pointer; font-size: 13px; transition: all .2s;
    }
    .pagination button:hover { border-color: #89b4fa; color: #89b4fa; }
    .pagination button.active { background: #89b4fa; color: white; border-color: #89b4fa; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 空状态 */
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* 标签 */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .tag-blue { background: #e8f0fe; color: #4285f4; }
    .tag-green { background: #e6f4ea; color: #34a853; }
    .tag-red { background: #fce8e6; color: #ea4335; }
    .tag-gray { background: #f0f0f0; color: #666; }

    /* 返回按钮 */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
      border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer;
      font-size: 13px; color: #555; margin-bottom: 16px; transition: all .2s;
    }
    .back-btn:hover { border-color: #89b4fa; color: #89b4fa; }

    /* 加载 */
    .loading { text-align: center; padding: 40px; color: #999; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar .logo span, .sidebar nav a span:not(.icon) { display: none; }
      .sidebar nav a { justify-content: center; padding: 14px; }
      .main { margin-left: 60px; padding: 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🤖 <span>管理后台</span></div>
  <nav>
    <a class="active" data-page="overview"><span class="icon">📊</span><span>数据概览</span></a>
    <a data-page="sessions"><span class="icon">💬</span><span>会话记录</span></a>
    <a data-page="users"><span class="icon">👥</span><span>用户管理</span></a>
    <a data-page="errors"><span class="icon">⚠️</span><span>错误日志</span></a>
  </nav>
</div>

<div class="main" id="app">
  <div class="loading">加载中...</div>
</div>

<script src="app.js"></script>
</body>
</html>
